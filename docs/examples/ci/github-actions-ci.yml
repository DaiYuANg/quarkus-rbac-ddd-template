name: example-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify compile and tests
        run: ./gradlew assemble test --no-daemon

  quality:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Full build
        run: ./gradlew build --no-daemon

  build-admin-image:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build admin-api image
        run: ./gradlew :apps:admin-api:quarkusBuild --no-daemon

  migrate-and-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - quality
      - build-admin-image
    steps:
      - name: Run migrator
        run: echo "Run apps:migrator against the target environment before promoting the API"
      - name: Deploy api
        run: echo "Deploy the app image with your platform-specific release step"

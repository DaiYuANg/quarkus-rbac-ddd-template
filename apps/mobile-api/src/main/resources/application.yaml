# Mobile / C 端示例进程：与 admin-api 共享同一套 identity + security-runtime，但通过 app.identity.* 区分主体类型；
# 不包含后台 RBAC 管理类 REST（User/Role/Permission 等仅在 admin-api 暴露）。
quarkus:
  application:
    name: mobile-api
  container-image:
    name: mobile-api
  http:
    port: 8081
    cors:
      enabled: true
      origins: /.*/
  datasource:
    db-kind: postgresql
    username: postgres
    password: postgres
    jdbc:
      url: jdbc:postgresql://localhost:5433/rbac
  hibernate-orm:
    schema-management:
      strategy: validate
    physical-naming-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    log:
      sql: true
    sql-load-script: no-file
  redis:
    hosts: redis://localhost:6379
  smallrye-openapi:
    path: /q/openapi
  swagger-ui:
    always-include: true
  management:
    enabled: true
    port: 9001
    root-path: /q
  smallrye-health:
    root-path: /q/health
  micrometer:
    export:
      prometheus:
        path: /q/metrics/prometheus
  otel:
    enabled: true
    exporter:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
        protocol: grpc
    resource:
      attributes: service.name=mobile-api,service.version=1.0.0-SNAPSHOT
  info:
    enabled: true
  log:
    level: INFO
    console:
      json:
        enabled: true
        log-format: ecs
  package:
    jar:
      aot:
        enabled: true
        phase: build

app:
  identity:
    # DB 用户（sys_user）登录后 JWT / 权限快照中的 userType；与 admin-api 的 ADMIN 区分。
    db-user-type: MEMBER
    # 配置文件用户默认 userType；可被各账号的 principal-user-type 覆盖。
    config-user-fallback-type: MEMBER
  security:
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    login-failure-max-attempts: 5
    login-failure-lock-seconds: 900
    config-users:
      # 密码与 admin 默认 root 相同（bcrypt 对应 "root"），仅作本地示例。
      mobile-member:
        username: mobile-member
        password-hash: $2a$10$c2V22M8f.jUtSuBz.I4r1uHTCwMWsnRabXr6fs9gKdmoRThu/j3a6
        display-name: Demo Member
        principal-user-type: MEMBER
        roles: []
        permissions: []
      mobile-merchant:
        username: mobile-merchant
        password-hash: $2a$10$c2V22M8f.jUtSuBz.I4r1uHTCwMWsnRabXr6fs9gKdmoRThu/j3a6
        display-name: Demo Merchant
        principal-user-type: MERCHANT
        roles: []
        permissions: []

"%dev":
  quarkus:
    otel:
      enabled: false
    hibernate-orm:
      log:
        sql: true
        format-sql: true
        bind-parameters: true
    log:
      min-level: TRACE
      category:
        "com.github.DaiYuANg.modules.identity.application":
          level: DEBUG
        "com.github.DaiYuANg.mobile":
          level: DEBUG
        "com.github.DaiYuANg.security":
          level: DEBUG
        "org.hibernate.orm.jdbc.bind":
          level: TRACE
      console:
        json:
          enabled: false

"%test":
  quarkus:
    datasource:
      jdbc:
        url: jdbc:tc:postgresql:16-alpine:///rbac_test
      username: postgres
      password: postgres
    otel:
      enabled: false
    redis:
      devservices:
        enabled: true
        image-name: valkey/valkey:8-alpine
    log:
      console:
        json:
          enabled: false

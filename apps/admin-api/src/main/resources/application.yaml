app:
  security:
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    login-failure-max-attempts: 5
    login-failure-lock-seconds: 900
    # Default user from config (no database). Password: root (bcrypt).
    config-users:
      default:
        username: root
        password-hash: $2a$10$c2V22M8f.jUtSuBz.I4r1uHTCwMWsnRabXr6fs9gKdmoRThu/j3a6
        display-name: Default Admin
        roles:
          - root
          - ops
        permissions:
          - system.user:view
          - system.user:update
          - system.role:view
          - system.role:update

"%dev":
  quarkus:
    otel:
      enabled: false
    hibernate-orm:
      log:
        # Show formatted SQL and JDBC bind parameters in dev mode
        sql: true
        format-sql: true
        bind-parameters: true
    log:
      # bind-parameter logging requires TRACE to be enabled
      min-level: TRACE
      category:
        "com.github.DaiYuANg.application.auth":
          level: DEBUG
        "com.github.DaiYuANg.security":
          level: DEBUG
        "org.hibernate.orm.jdbc.bind":
          level: TRACE
        "org.hibernate.orm.jdbc.extract":
          level: TRACE
      console:
        json:
          enabled: false

"%test":
  quarkus:
    otel:
      enabled: false
    log:
      console:
        json:
          enabled: false

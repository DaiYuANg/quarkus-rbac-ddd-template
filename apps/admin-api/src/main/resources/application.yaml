quarkus:
  container-image:
    name: admin-api
  http:
    port: 8080
    cors:
      enabled: true
      origins: /.*/
  datasource:
    db-kind: postgresql
    username: postgres
    password: postgres
    jdbc:
      url: jdbc:postgresql://localhost:5433/rbac
  hibernate-orm:
    schema-management:
      strategy: validate
    physical-naming-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    log:
      sql: true
    sql-load-script: no-file
  infinispan-client:
    hosts: localhost:11222
    username: admin
    password: password
    sasl-mechanism: DIGEST-SHA-256
    # Use BASIC when Infinispan runs in Docker: server advertises 172.18.x.x which host cannot reach
    client-intelligence: BASIC
  smallrye-openapi:
    path: /q/openapi
  swagger-ui:
    always-include: true
  management:
    enabled: true
    port: 9000
    root-path: /q
  smallrye-health:
    root-path: /q/health
  micrometer:
    export:
      prometheus:
        path: /q/metrics/prometheus
  otel:
    enabled: true
    exporter:
      otlp:
        endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
        protocol: grpc
    resource:
      attributes: service.name=admin-api,service.version=1.0.0-SNAPSHOT
  info:
    enabled: true
  log:
    level: INFO
    console:
      json:
        enabled: true
        log-format: ecs
  package:
    jar:
      # CDS/AOT: JDK 25 uses Leyden AOT (app.aot), older JDKs use AppCDS (app-cds.jsa)
      aot:
        enabled: true
        phase: build


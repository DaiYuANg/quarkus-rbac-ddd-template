quarkus:
  container-image:
    name: migrator
  banner:
    enabled: false
  log:
    level: INFO
    console:
      json:
        enabled: true
        log-format: ecs
  datasource:
    db-kind: postgresql
    username: postgres
    password: postgres
    jdbc:
      url: jdbc:postgresql://localhost:5433/rbac
  flyway:
    migrate-at-start: false
    validate-at-start: false
    clean-disabled: true
    locations: db/migration
    schemas: public
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history

"%dev":
  quarkus:
    datasource:
      username: postgres
      password: postgres
      jdbc:
        url: jdbc:postgresql://localhost:5433/rbac
    log:
      console:
        json:
          enabled: false

"%test":
  quarkus:
    datasource:
      username: postgres
      password: postgres
      jdbc:
        url: jdbc:postgresql://localhost:5433/rbac_test
    log:
      console:
        json:
          enabled: false

"%prod":
  quarkus:
    datasource:
      username: ${DB_USERNAME:postgres}
      password: ${DB_PASSWORD:postgres}
      jdbc:
        # Keep the packaged app runnable on a developer machine by default.
        # Container deployments override this with DB_JDBC_URL (for example docker-compose uses postgres:5432).
        url: ${DB_JDBC_URL:jdbc:postgresql://localhost:5433/rbac}
    flyway:
      schemas: ${DB_SCHEMA:public}
